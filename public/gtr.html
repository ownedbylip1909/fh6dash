<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<title>GT-R · FH6 Telemetry</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; width:100vw; height:100vh; overflow:hidden; display:flex; align-items:center; justify-content:center; }
canvas { display:block; }
.back { position:fixed; top:16px; left:82px; color:#181818; font-size:9px; font-family:'SF Mono',monospace; letter-spacing:2px; text-decoration:none; z-index:9; transition:color .2s; }
.back:hover { color:#555; }
</style>
</head>
<body>
<a href="/" class="back">← HUB</a>
<canvas id="c"></canvas>
<script src="shared.js"></script>
<script>
function drawGTR(rpm, rpmMax, speed, boost, gear, d) {
  const T = {cx:820, cy:435, r:285};
  const oR = T.r * .97, iR = T.r * .60, rlAng = valAngle(rpmMax * .875, 0, rpmMax);
  bezel(T.cx, T.cy, T.r, 13);
  ctx.beginPath(); ctx.arc(T.cx, T.cy, T.r, 0, TAU); ctx.fillStyle = '#080808'; ctx.fill();
  ctx.save();
  ctx.beginPath(); ctx.moveTo(T.cx, T.cy); ctx.arc(T.cx, T.cy, oR, G_START, G_START + G_SWEEP, false); ctx.closePath();
  const rg = ctx.createRadialGradient(T.cx, T.cy, iR * .8, T.cx, T.cy, oR);
  rg.addColorStop(0, '#aa1100'); rg.addColorStop(.4, '#c41800'); rg.addColorStop(1, '#d01c00');
  ctx.fillStyle = rg; ctx.fill();
  ctx.beginPath(); ctx.moveTo(T.cx, T.cy); ctx.arc(T.cx, T.cy, oR, rlAng, G_START + G_SWEEP, false); ctx.closePath();
  ctx.fillStyle = '#ff330022'; ctx.fill();
  ctx.restore();
  ctx.beginPath(); ctx.arc(T.cx, T.cy, iR, 0, TAU); ctx.fillStyle = '#080808'; ctx.fill();
  ctx.beginPath(); ctx.arc(T.cx, T.cy, iR, 0, TAU); ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 2; ctx.stroke();
  for (let i = 0; i <= Math.round(rpmMax / 200); i++) {
    const v = i * 200, isMaj = v % 1000 === 0, isMed = v % 500 === 0;
    const a = valAngle(v, 0, rpmMax), cos = Math.cos(a), sin = Math.sin(a);
    const len = isMaj ? T.r * .13 : (isMed ? T.r * .07 : T.r * .04);
    if (oR - len < iR + 4) continue;
    ctx.beginPath(); ctx.moveTo(T.cx + cos * oR, T.cy + sin * oR); ctx.lineTo(T.cx + cos * (oR - len), T.cy + sin * (oR - len));
    ctx.strokeStyle = v >= rpmMax * .875 ? '#ffeeaa' : '#fff'; ctx.lineWidth = isMaj ? 2.5 : (isMed ? 1.5 : 1); ctx.lineCap = 'round'; ctx.stroke();
    if (isMaj) txt(T.cx + cos * T.r * .775, T.cy + sin * T.r * .775, v / 1000, T.r * .1, v >= rpmMax * .875 ? '#ffffcc' : '#fff', 'center', '700');
  }
  txt(T.cx, T.cy - iR * .52, 'RPM×1000', T.r * .065, '#ffffff33');
  ctx.save(); ctx.font = 'italic 900 ' + (T.r * .092) + 'px Arial,sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#cc2200cc'; ctx.shadowColor = '#ff330066'; ctx.shadowBlur = 8; ctx.fillText('NISMO', T.cx, T.cy - iR * .18); ctx.restore();
  const pw = iR * 1.55, ph = iR * .5, px = T.cx - pw / 2, py = T.cy + iR * .22;
  rrect(px, py, pw, ph, 6);
  const pg = ctx.createLinearGradient(px, py, px, py + ph); pg.addColorStop(0, '#0050ee'); pg.addColorStop(1, '#003ab8');
  ctx.fillStyle = pg; ctx.fill(); rrect(px, py, pw, ph, 6); ctx.strokeStyle = '#4488ff44'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.save(); ctx.shadowColor = '#88bbff88'; ctx.shadowBlur = 8;
  txt(T.cx, py + ph * .5, Math.round(speed) + ' km/h', ph * .44, '#fff', 'center', '700', 'SF Mono'); ctx.restore();
  if (d && d.currentLap > 0) txt(T.cx, py + ph + T.r * .065, fmtLap(d.currentLap), T.r * .065, '#ffffff44', 'center', '400', 'SF Mono');
  needle(T.cx, T.cy, T.r, valAngle(Math.max(0, Math.min(rpmMax, rpm)), 0, rpmMax));

  const S = {cx:315, cy:450, r:205};
  bezel(S.cx, S.cy, S.r, 10);
  ctx.beginPath(); ctx.arc(S.cx, S.cy, S.r, 0, TAU);
  const sfg = ctx.createRadialGradient(S.cx, S.cy - S.r * .1, 0, S.cx, S.cy, S.r);
  sfg.addColorStop(0, '#141414'); sfg.addColorStop(1, '#070707'); ctx.fillStyle = sfg; ctx.fill();
  ctx.beginPath(); ctx.arc(S.cx, S.cy, S.r - 1, 0, TAU); ctx.strokeStyle = '#1c1c1c'; ctx.lineWidth = 2; ctx.stroke();
  for (let v = 0; v <= 260; v += 5) {
    const isMaj = v % 20 === 0, isMed = v % 10 === 0;
    const a = valAngle(v, 0, 260), cos = Math.cos(a), sin = Math.sin(a), o = S.r * .90, len = isMaj ? S.r * .12 : (isMed ? S.r * .07 : S.r * .04);
    ctx.beginPath(); ctx.moveTo(S.cx + cos * o, S.cy + sin * o); ctx.lineTo(S.cx + cos * (o - len), S.cy + sin * (o - len));
    ctx.strokeStyle = '#999'; ctx.lineWidth = isMaj ? 2 : 1; ctx.lineCap = 'round'; ctx.stroke();
    if (isMaj && v % 40 === 0) txt(S.cx + cos * S.r * .75, S.cy + sin * S.r * .75, v, S.r * .09, '#ccc', 'center', '700');
  }
  txt(S.cx, S.cy - S.r * .08, Math.round(speed), S.r * .22, '#e0e0e0', 'center', '700', 'SF Mono');
  txt(S.cx, S.cy + S.r * .22, 'km/h', S.r * .09, '#666');
  needle(S.cx, S.cy, S.r, valAngle(Math.max(0, Math.min(260, speed)), 0, 260));

  const G = {cx:1285, cy:280, r:118};
  bezel(G.cx, G.cy, G.r, 8);
  ctx.beginPath(); ctx.arc(G.cx, G.cy, G.r, 0, TAU);
  const gbg = ctx.createRadialGradient(G.cx, G.cy - G.r * .15, G.r * .05, G.cx, G.cy, G.r);
  gbg.addColorStop(0, '#1a6fff'); gbg.addColorStop(1, '#002fa8'); ctx.fillStyle = gbg; ctx.fill();
  ctx.beginPath(); ctx.arc(G.cx, G.cy, G.r - 3, 0, TAU); ctx.strokeStyle = '#4488ff33'; ctx.lineWidth = 4; ctx.stroke();
  const gc = gear === 'R' ? '#ff5577' : gear === 'N' ? '#ffdd66' : '#fff';
  ctx.save(); ctx.shadowColor = gc; ctx.shadowBlur = 24; txt(G.cx, G.cy + G.r * .07, gear, G.r * .74, gc, 'center', '900'); ctx.restore();

  const B = {cx:1285, cy:575, r:150}, bMn = -15, bMx = 35;
  bezel(B.cx, B.cy, B.r, 9);
  ctx.beginPath(); ctx.arc(B.cx, B.cy, B.r, 0, TAU); ctx.fillStyle = '#080808'; ctx.fill();
  [[bMn, 0, '#1a3366aa'], [0, 20, '#1a4422aa'], [20, bMx, '#553311aa']].forEach(function(seg) {
    ctx.beginPath(); ctx.arc(B.cx, B.cy, B.r * .82, valAngle(seg[0], bMn, bMx), valAngle(seg[1], bMn, bMx), false);
    ctx.strokeStyle = seg[2]; ctx.lineWidth = Math.round(B.r * .09); ctx.lineCap = 'butt'; ctx.stroke();
  });
  for (let v = bMn; v <= bMx; v++) {
    const isMaj = v % 5 === 0, a = valAngle(v, bMn, bMx), cos = Math.cos(a), sin = Math.sin(a), o = B.r * .90, len = isMaj ? B.r * .12 : B.r * .05;
    ctx.beginPath(); ctx.moveTo(B.cx + cos * o, B.cy + sin * o); ctx.lineTo(B.cx + cos * (o - len), B.cy + sin * (o - len));
    ctx.strokeStyle = '#777'; ctx.lineWidth = isMaj ? 2 : 1; ctx.lineCap = 'round'; ctx.stroke();
    if (isMaj) txt(B.cx + cos * B.r * .72, B.cy + sin * B.r * .72, v, B.r * .1, '#aaa', 'center', '700');
  }
  const za = valAngle(0, bMn, bMx);
  ctx.beginPath(); ctx.moveTo(B.cx + Math.cos(za) * B.r * .77, B.cy + Math.sin(za) * B.r * .77);
  ctx.lineTo(B.cx + Math.cos(za) * B.r * .94, B.cy + Math.sin(za) * B.r * .94);
  ctx.strokeStyle = '#ffffffbb'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.stroke();
  txt(B.cx, B.cy - B.r * .42, 'BOOST', B.r * .11, '#777');
  txt(B.cx, B.cy + B.r * .25, (boost >= 0 ? '+' : '') + boost.toFixed(1), B.r * .2, '#aabbdd', 'center', '700', 'SF Mono');
  txt(B.cx, B.cy + B.r * .43, 'psi', B.r * .1, '#444');
  needle(B.cx, B.cy, B.r, valAngle(Math.max(bMn, Math.min(bMx, boost)), bMn, bMx));
}

window.addEventListener('DOMContentLoaded', function() {
  canvas = document.getElementById('c');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
  connect();
  requestAnimationFrame(loop);
});

function loop() {
  const d = data;
  const rpm = d ? d.currentEngineRpm : 0, rpmMax = d ? d.engineMaxRpm : 8000;
  const speed = d ? d.speedKmh : 0, boost = d ? d.boost : 0;
  const gr = d ? d.gear : null;
  const gear = gr == null ? '-' : gr === 0 ? 'N' : gr === 11 ? 'R' : String(gr);

  ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, VW, VH);
  const vig = ctx.createRadialGradient(VW/2, VH/2, VH*.15, VW/2, VH/2, VW*.65);
  vig.addColorStop(0, '#00000000'); vig.addColorStop(1, '#000000bb');
  ctx.fillStyle = vig; ctx.fillRect(0, 0, VW, VH);

  drawShiftLights(rpm, rpmMax);
  drawGTR(rpm, rpmMax, speed, boost, gear, d);
  drawInfoBar(d);

  if (!d) {
    ctx.fillStyle = '#ffffff0e'; ctx.font = '700 ' + (VW * .035) + 'px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Warte auf Forza Horizon…', VW/2, VH*.5);
  }

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
